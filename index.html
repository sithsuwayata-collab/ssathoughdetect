<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thought Detective</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#6C8CF5,#A084E8);
    display:flex;
    justify-content:center;
}

.app {
    width:100%;
    max-width:500px;
    min-height:100vh;
    background:#f4f6f9;
    display:flex;
    flex-direction:column;
    position:relative;
}

.header {
    text-align:center;
    padding:10px;
    background:white;
    position:relative;
}

.header img {
    height:60px;
    display:block;
    margin:auto;
}

.log-btn {
    position:absolute;
    right:10px;
    top:10px;
    cursor:pointer;
    font-size:20px;
}

.card {
    background:white;
    margin:15px;
    padding:20px;
    border-radius:16px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.timer {
    background:#e9ecef;
    padding:6px 12px;
    border-radius:20px;
    display:inline-block;
    margin-bottom:10px;
}

button {
    width:100%;
    padding:14px;
    margin:8px 0;
    border:none;
    border-radius:12px;
    background:#2c7be5;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button.correct { background:#28a745; }
button.wrong { background:#dc3545; }

.next-btn {
    background:#6c757d;
}

.footer {
    text-align:center;
    padding:10px;
}

.log-panel {
    position:absolute;
    top:0;
    right:-260px;
    width:260px;
    height:100%;
    background:#1f2d3d;
    color:white;
    padding:10px;
    transition:0.3s;
    overflow:auto;
}

.log-panel.open {
    right:0;
}

.close-btn {
    text-align:right;
    cursor:pointer;
    font-size:18px;
}
</style>
</head>

<div class="log-panel" id="logPanel">

<h3>Session</h3>

/* DISTORTIONS */
const distortions = [
"Mind Reading","Catastrophizing","Overgeneralization",
"Emotional Reasoning","Personalization","Labeling",
"Black & White Thinking","Fortune Telling"
];

const explainMap={
"Mind Reading":"Assuming what others think.",
"Catastrophizing":"Expecting worst outcome.",
"Overgeneralization":"One event defines everything.",
"Emotional Reasoning":"Feelings = facts.",
"Personalization":"Blaming yourself.",
"Labeling":"Negative identity.",
"Black & White Thinking":"All or nothing.",
"Fortune Telling":"Predicting future."
};

/* ===== SMART SHUFFLE ===== */
let deck = [];
let index = 0;

function shuffleDeck(){
    deck = [...scenarios];
    for(let i=deck.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [deck[i],deck[j]]=[deck[j],deck[i]];
    }
    index=0;
}

/* STATE */
let score=0,total=0;
let current, timer, timeLeft=15;
let startTime=null;

/* LOG */
function toggleLog(){
document.getElementById("logPanel").classList.toggle("open");
}

/* NEXT */
function next(){

if(!startTime){
startTime=new Date();
document.getElementById("startTime").innerText=startTime.toLocaleTimeString();
}

/* RESHUFFLE WHEN DONE */
if(index>=deck.length){
shuffleDeck();
}

current = deck[index];
index++;

load();
startTimer();
}

/* TIMER */
function startTimer(){
clearInterval(timer);
timeLeft=15;
document.getElementById("timer").innerText="⏱ "+timeLeft;

timer=setInterval(()=>{
timeLeft--;
document.getElementById("timer").innerText="⏱ "+timeLeft;

if(timeLeft<=0){
clearInterval(timer);
fail();
}
},1000);
}

/* LOAD */
function load(){
document.getElementById("scenario").innerText=current.text;
document.getElementById("options").innerHTML="";
document.getElementById("feedback").innerText="";
document.getElementById("explain").innerText="";
document.getElementById("step").innerText="Find the thinking trap";

/* PICK 5 OPTIONS */
let opts=[current.distortion];
while(opts.length<5){
let r=distortions[Math.floor(Math.random()*distortions.length)];
if(!opts.includes(r)) opts.push(r);
}
opts.sort(()=>Math.random()-0.5);

opts.forEach(o=>{
let b=document.createElement("button");
b.innerText=o;
b.onclick=()=>checkD(b,o);
document.getElementById("options").appendChild(b);
});
}

/* CHECK */
function checkD(btn,val){
disable();
clearInterval(timer);

if(val===current.distortion){
btn.classList.add("correct");
document.getElementById("feedback").innerText="Correct";
score++;
log(true);
}else{
btn.classList.add("wrong");
document.getElementById("feedback").innerText="Correct: "+current.distortion;
log(false);
}

document.getElementById("explain").innerText=explainMap[current.distortion];

total++;
updateStats();
}

/* FAIL */
function fail(){
document.getElementById("feedback").innerText="Time up! Correct: "+current.distortion;
document.getElementById("explain").innerText=explainMap[current.distortion];
total++;
log(false);
updateStats();
}

/* UTIL */
function disable(){
document.querySelectorAll("#options button").forEach(b=>b.disabled=true);
}

function updateStats(){

    document.getElementById("score").innerText = score;
    document.getElementById("answered").innerText = total;

    let acc = total > 0 ? Math.round((score / total) * 100) : 0;

    document.getElementById("accuracy").innerText = acc + "%";
    document.getElementById("finalAccuracy").innerText = acc + "%";

    document.getElementById("endTime").innerText = new Date().toLocaleTimeString();
}

function log(ok){
let d=document.createElement("div");
d.style.color=ok?"#4caf50":"#ff6b6b";
d.innerText="Case "+current.id+" - "+(ok?"Correct":"Wrong");
document.getElementById("logItems").prepend(d);
}

/* START */
shuffleDeck();
next();

</script>
