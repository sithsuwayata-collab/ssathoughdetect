<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thought Detective | Luminous 30s</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #020617;
            --frame-1: #065f46;
            --frame-2: #10b981;
            --neon: #adff2f;
            --neon-glow: rgba(173, 255, 47, 0.4);
            --btn-shadow: #65a30d;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; background: var(--bg);
            height: 100vh; display: flex;
            justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* The App Frame */
        .app-frame {
            width: 340px; height: 600px;
            background: linear-gradient(135deg, var(--frame-1), var(--frame-2));
            border-radius: 40px; position: relative;
            box-shadow: 0 0 40px rgba(16, 185, 129, 0.2);
            padding: 20px; display: flex; flex-direction: column;
            border: 2px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }

        /* Shine Animation - Pointer Events Disabled to fix "unclickable" issue */
        .app-frame::after {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg); animation: shine 6s infinite;
            pointer-events: none; z-index: 5;
        }

        @keyframes shine { 0% { transform: translateX(-100%) rotate(45deg); } 100% { transform: translateX(100%) rotate(45deg); } }

        .top-bar { display: flex; justify-content: space-between; align-items: center; z-index: 10; margin-bottom: 15px; }
        
        #timer-box { background: rgba(0,0,0,0.3); padding: 5px 12px; border-radius: 20px; color: var(--neon); font-weight: 900; font-size: 0.9rem; border: 1px solid var(--neon); }

        .icon-btn { background: rgba(0,0,0,0.4); border: 1px solid var(--neon); color: var(--neon); width: 35px; height: 35px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }

        /* Question Area */
        .scenario-card { background: #fff; padding: 20px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); z-index: 10; position: relative; }
        h2 { font-size: 0.9rem; margin: 0; color: #1e293b; line-height: 1.4; text-align: center; }

        /* Feedback Screen (Hidden by default) */
        #feedback-screen {
            background: #020617; color: #fff; padding: 15px; border-radius: 15px; margin-top: 15px;
            display: none; border: 1px solid var(--neon); box-shadow: 0 0 15px var(--neon-glow);
            z-index: 20; position: relative;
        }

        /* Ultra-Small 3D Luminous Buttons */
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: auto; z-index: 10; margin-bottom: 10px; }
        
        .opt-btn {
            background: var(--neon); border: none; padding: 12px 2px; border-radius: 8px;
            font-size: 10px; font-weight: 900; color: #064e3b; cursor: pointer;
            box-shadow: 0 4px 0 var(--btn-shadow); position: relative;
            transition: all 0.05s; text-transform: uppercase;
        }

        .opt-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--btn-shadow); }
        .opt-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        /* Score Modal */
        #score-card {
            position: absolute; inset: 0; background: rgba(2,6,23,0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            color: white; z-index: 100; padding: 30px;
        }
        .stat-row { width: 100%; display: flex; justify-content: space-between; margin: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
        .stat-val { color: var(--neon); font-weight: 900; }
    </style>
</head>
<body>

<div class="app-frame">
    <div class="top-bar">
        <div id="timer-box">30s</div>
        <button class="icon-btn" onclick="toggleScore()"><i data-lucide="layout-grid"></i></button>
    </div>

    <div class="scenario-card">
        <h2 id="scenario-text">Detecting thought pattern...</h2>
    </div>

    <div id="feedback-screen">
        <div id="fb-status" style="color: var(--neon); font-weight: 900; margin-bottom: 5px;"></div>
        <div id="fb-thought" style="font-size: 0.8rem; margin-bottom: 10px;"></div>
        <button onclick="nextCase()" style="width:100%; padding:8px; background:var(--neon); border:none; border-radius:5px; font-weight:900; cursor:pointer;">NEXT CASE</button>
    </div>

    <div id="options" class="options-grid"></div>

    <div id="score-card">
        <i data-lucide="shield-check" size="48" style="color:var(--neon); margin-bottom:10px;"></i>
        <h3 style="letter-spacing: 2px;">DETECTIVE STATS</h3>
        <div class="stat-row"><span>Started:</span> <span id="stat-start" class="stat-val">-</span></div>
        <div class="stat-row"><span>Situations:</span> <span id="stat-total" class="stat-val">0</span></div>
        <div class="stat-row"><span>Solved:</span> <span id="stat-correct" class="stat-val">0</span></div>
        <div class="stat-row"><span>Accuracy:</span> <span id="stat-percent" class="stat-val">0%</span></div>
        <button onclick="toggleScore()" style="margin-top:20px; background:transparent; border:1px solid var(--neon); color:var(--neon); padding:10px 20px; border-radius:20px; cursor:pointer;">BACK TO FIELD</button>
    </div>
</div>

<script>
    // Minimal data sample - add your 100 scenarios here
    const scenarios = [
        { id:1, text:"They didn't call me back, they must hate me.", distortion:"Mind Reading", thought:"They might be busy." },
        { id:2, text:"I made one mistake, I'm a complete failure.", distortion:"Labeling", thought:"One mistake doesn't define me." }
    ];

    const types = ["Mind Reading", "Catastrophizing", "Overgeneralization", "Emotional Reasoning", "Personalization", "Labeling", "Fortune Telling", "Black & White"];

    let stats = {
        idx: 0, score: 0, total: 0,
        start: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
        timeLeft: 30, timer: null
    };

    function nextCase() {
        clearInterval(stats.timer);
        stats.timeLeft = 30; // Timer set to 30s
        document.getElementById('timer-box').innerText = stats.timeLeft + "s";
        document.getElementById('feedback-screen').style.display = 'none';
        
        const cur = scenarios[stats.idx % scenarios.length];
        document.getElementById('scenario-text').innerText = cur.text;
        
        const grid = document.getElementById('options');
        grid.innerHTML = "";
        types.forEach(t => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = t;
            btn.onclick = () => check(t, cur);
            grid.appendChild(btn);
        });
        
        startTimer();
        stats.idx++;
    }

    function check(choice, cur) {
        clearInterval(stats.timer);
        stats.total++;
        
        // Disable all buttons to prevent double-click
        document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);

        const fb = document.getElementById('feedback-screen');
        const status = document.getElementById('fb-status');
        const thought = document.getElementById('fb-thought');

        if(choice === cur.distortion) {
            stats.score++;
            status.innerText = "EVIDENCE CONFIRMED";
            thought.innerText = "Healthy Perspective: " + cur.thought;
        } else {
            status.innerText = "FALSE LEAD";
            thought.innerText = "Actually " + cur.distortion + ". Better Thought: " + cur.thought;
        }

        fb.style.display = 'block';
        updateUI();
    }

    function startTimer() {
        stats.timer = setInterval(() => {
            stats.timeLeft--;
            document.getElementById('timer-box').innerText = stats.timeLeft + "s";
            if(stats.timeLeft <= 0) {
                clearInterval(stats.timer);
                alert("Time up! Trail went cold.");
                nextCase();
            }
        }, 1000);
    }

    function updateUI() {
        document.getElementById('stat-total').innerText = stats.total;
        document.getElementById('stat-correct').innerText = stats.score;
        document.getElementById('stat-percent').innerText = Math.round((stats.score/stats.total)*100) + "%";
    }

    function toggleScore() {
        const modal = document.getElementById('score-card');
        modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
    }

    window.onload = () => {
        lucide.createIcons();
        document.getElementById('stat-start').innerText = stats.start;
        nextCase();
    };
</script>
</body>
</html>
