<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logic Lens | Mental Health App</title>

<style>
/* CSS RESET FOR MODERN APPS */
body, h1, h2, h3, h4, p, figure, blockquote, dl, dd { margin: 0; padding: 0; }
body { font-family: 'Plus Jakarta Sans', sans-serif; line-height: 1.5; color: white; overflow: hidden; height: 100vh; background-color: #022c22; /* Zen static background */}

:root {
    --bg-deep: #064e3b;
    --glass: rgba(255, 255, 255, 0.1);
    --neon-green: #adff2f;
    --soft-green: #ecfdf5;
    --text-dark: #064e3b;
}

/* APP CONTAINERS */
.app-screen { width: 100%; height: 100%; position: absolute; inset: 0; transition: opacity 0.5s ease, transform 0.5s ease; padding: 30px; box-sizing: border-box; display: none; }
.app-screen.active { display: flex; flex-direction: column; opacity: 1; transform: scale(1); }

/* == SCREEN 1: LANDING PAGE == */
#landing-screen {
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle, #0a5f44 0%, #064e3b 100%);
    text-align: center;
    opacity: 0; transform: scale(0.9);
}

.landing-logo { width: 140px; height: 140px; border-radius: 50%; padding: 10px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(5px); margin-bottom: 20px; }

/* The Modern Magnifying Glass (Start Button) */
.start-btn {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 3px solid var(--neon-green);
    background: transparent;
    color: var(--neon-green);
    font-size: 2.5rem;
    cursor: pointer;
    margin-top: 40px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 0 15px rgba(173, 255, 47, 0.2);
}

.start-btn:hover { background: var(--neon-green); color: var(--text-dark); box-shadow: 0 0 30px rgba(173, 255, 47, 0.5); transform: scale(1.1); }
.start-btn:active { transform: scale(0.95); }

/* == SCREEN 2: GAME PANEL (CBT LAB) == */
#game-screen { background-color: var(--bg-deep); display: none; /* Controlled by JS */}

/* Case Card */
.case-card { background: white; border-radius: 28px; padding: 24px; color: var(--text-dark); box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin-top: 20px; text-align: center; }
h2 { font-size: 0.9rem; line-height: 1.5; margin: 0; font-weight: 600; }

/* 3D Circular Buttons */
.options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: auto; padding-bottom: 20px; z-index: 10; }
.opt-btn {
    background: var(--soft-green);
    border: none;
    height: 70px;
    border-radius: 35px; /* Pill shape */
    font-size: 11px;
    font-weight: 800;
    color: var(--text-dark);
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 4px 0 #82c91e;
    transition: all 0.1s;
    text-align: center;
}
.opt-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #82c91e; }
.opt-btn:disabled { opacity: 0.6; cursor: not-allowed; }

</style>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>

<div style="position:fixed; inset:0; padding:10px; pointer-events:none; z-index:1000; border-radius:45px; box-shadow: 0 0 50px rgba(16, 185, 129, 0.15); border: 1px solid rgba(255,255,255,0.05);"></div>

<div style="position:relative; width:100%; height:100vh; border-radius:40px; overflow:hidden;">

    <div id="landing-screen" class="app-screen active">

        <h1 style="font-weight: 800; font-size: 1.7rem; color: #ecfdf5;">LOGIC LENS</h1>

        <button class="start-btn" onclick="launchGame()" aria-label="Start Game">
            ⚲ </button>
    </div>

    <div id="game-screen" class="app-screen">

        </div>

        </div>

        <div id="feedback-panel" style="background:#022c22; border-radius:20px; padding:15px; margin-top:15px; display:none; border-left:4px solid var(--neon-green); font-size:0.8rem;">
            <div id="fb-status" style="color: var(--neon-green); font-weight: 800; text-transform: uppercase;"></div>
            <div id="fb-thought" style="margin: 6px 0 10px;"></div>

        </div>

        <div id="options-grid" class="options-grid"></div>

</div>

</html>
