<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thought Detective</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#6C8CF5,#A084E8);
    display:flex;
    justify-content:center;
}

/* APP */
.app {
    width:100%;
    max-width:500px;
    min-height:100vh;
    background:#f4f6f9;
    display:flex;
    flex-direction:column;
    position:relative;
}

/* HEADER */
.header {
    text-align:center;
    padding:10px;
    background:white;
    position:relative;
}

.header img {
    height:60px;
    display:block;
    margin:auto;
}

.log-btn {
    position:absolute;
    right:10px;
    top:10px;
    cursor:pointer;
    font-size:20px;
}

/* CARD */
.card {
    background:white;
    margin:15px;
    padding:20px;
    border-radius:16px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

/* TIMER */
.timer {
    background:#e9ecef;
    padding:6px 12px;
    border-radius:20px;
    display:inline-block;
    margin-bottom:10px;
}

/* BUTTONS */
button {
    width:100%;
    padding:14px;
    margin:8px 0;
    border:none;
    border-radius:12px;
    background:#2c7be5;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button.correct { background:#28a745; }
button.wrong { background:#dc3545; }

.next-btn {
    background:#6c757d;
}

/* FOOTER */
.footer {
    text-align:center;
    padding:10px;
}

/* LOG PANEL */
.log-panel {
    position:absolute;
    top:0;
    right:-260px;
    width:260px;
    height:100%;
    background:#1f2d3d;
    color:white;
    padding:10px;
    transition:0.3s;
    overflow:auto;
}

.log-panel.open {
    right:0;
}

.close-btn {
    text-align:right;
    cursor:pointer;
    font-size:18px;
}
</style>
</head>

<body>

<div class="app">

<!-- HEADER -->
<div class="header">
<div class="log-btn" onclick="toggleLog()">📊</div>
<img src="logo.png">
<h3>Thought Detective</h3>
</div>

<!-- MAIN -->
<div class="card">

<div class="timer" id="timer">⏱ 15</div>

<h3 id="scenario"></h3>
<h4 id="step"></h4>

<div id="options"></div>

<p id="feedback"></p>
<p id="explain"></p>

<button class="next-btn" onclick="next()">Next →</button>

</div>

<div class="footer">
Score: <span id="score">0</span> | Accuracy: <span id="accuracy">0%</span>
</div>

<!-- LOG PANEL -->
<div class="log-panel" id="logPanel">
<div class="close-btn" onclick="toggleLog()">✖</div>
<h3>Session</h3>
<div id="logItems"></div>
<hr>
<p>Start: <span id="startTime">-</span></p>
<p>End: <span id="endTime">-</span></p>
<p>Accuracy: <span id="finalAccuracy">0%</span></p>
</div>

</div>

<script>

/* DATA */
const scenarios = [
{ id:1, text:"My friend didn’t reply all day.", distortion:"Mind Reading", thought:"They may be busy." },
{ id:2, text:"I failed an exam.", distortion:"Catastrophizing", thought:"I can improve next time." },
{ id:3, text:"My partner was quiet.", distortion:"Mind Reading", thought:"They may be tired." },
{ id:4, text:"I made a mistake at work.", distortion:"Overgeneralization", thought:"Everyone makes mistakes." },
{ id:5, text:"I feel anxious about future.", distortion:"Fortune Telling", thought:"I can focus on today." }
];

const distortions = [
"Mind Reading","Catastrophizing","Overgeneralization",
"Emotional Reasoning","Personalization","Labeling",
"Black & White Thinking","Fortune Telling"
];

const explainMap={
"Mind Reading":"Assuming what others think.",
"Catastrophizing":"Expecting worst outcome.",
"Overgeneralization":"One event defines everything.",
"Emotional Reasoning":"Feelings = facts.",
"Personalization":"Blaming yourself.",
"Labeling":"Negative identity.",
"Black & White Thinking":"All or nothing.",
"Fortune Telling":"Predicting future."
};

/* STATE */
let index=0, score=0, total=0;
let current, timer, timeLeft=15;
let startTime=null;

/* LOG TOGGLE */
function toggleLog(){
document.getElementById("logPanel").classList.toggle("open");
}

/* NEXT */
function next(){

if(!startTime){
startTime=new Date();
document.getElementById("startTime").innerText=startTime.toLocaleTimeString();
}

current=scenarios[Math.floor(Math.random()*scenarios.length)];

load();
startTimer();
}

/* TIMER */
function startTimer(){
clearInterval(timer);
timeLeft=15;
document.getElementById("timer").innerText="⏱ "+timeLeft;

timer=setInterval(()=>{
timeLeft--;
document.getElementById("timer").innerText="⏱ "+timeLeft;

if(timeLeft<=0){
clearInterval(timer);
fail();
}
},1000);
}

/* LOAD */
function load(){
document.getElementById("scenario").innerText=current.text;
document.getElementById("options").innerHTML="";
document.getElementById("feedback").innerText="";
document.getElementById("explain").innerText="";
document.getElementById("step").innerText="Find the thinking trap";

/* PICK 5 RANDOM OPTIONS */
let optionsArr=[current.distortion];

while(optionsArr.length<5){
let rand=distortions[Math.floor(Math.random()*distortions.length)];
if(!optionsArr.includes(rand)) optionsArr.push(rand);
}

/* SHUFFLE */
optionsArr.sort(()=>Math.random()-0.5);

optionsArr.forEach(opt=>{
let b=document.createElement("button");
b.innerText=opt;
b.onclick=()=>checkD(b,opt);
document.getElementById("options").appendChild(b);
});
}

/* CHECK */
function checkD(btn,val){
disable();
clearInterval(timer);

if(val===current.distortion){
btn.classList.add("correct");
document.getElementById("feedback").innerText="Correct";
document.getElementById("explain").innerText=explainMap[val];
score++;
log(true);
}else{
btn.classList.add("wrong");
document.getElementById("feedback").innerText="Correct: "+current.distortion;
document.getElementById("explain").innerText=explainMap[current.distortion];
log(false);
}

total++;
updateStats();
}

/* FAIL */
function fail(){
document.getElementById("feedback").innerText="Time up! Correct: "+current.distortion;
document.getElementById("explain").innerText=explainMap[current.distortion];
total++;
log(false);
updateStats();
}

/* UTIL */
function disable(){
document.querySelectorAll("#options button").forEach(b=>b.disabled=true);
}

function updateStats(){
document.getElementById("score").innerText=score;
let acc=Math.round((score/total)*100);
document.getElementById("accuracy").innerText=acc+"%";
document.getElementById("finalAccuracy").innerText=acc+"%";
document.getElementById("endTime").innerText=new Date().toLocaleTimeString();
}

function log(ok){
let d=document.createElement("div");
d.style.color=ok?"#4caf50":"#ff6b6b";
d.innerText="Case - "+(ok?"Correct":"Wrong");
document.getElementById("logItems").prepend(d);
}

/* START */
next();

</script>

</body>
</html>
