<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thought Detective | Luminous Green</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --frame-grad: linear-gradient(135deg, #065f46 0%, #10b981 100%);
            --glow-green: #adff2f;
            --btn-text: #064e3b;
            --glass: rgba(0, 0, 0, 0.3);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background: #020617;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* The Shining App Frame - Green Gradient */
        .app-frame {
            width: 350px;
            height: 620px;
            background: var(--frame-grad);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 40px;
            position: relative;
            box-shadow: 0 0 50px rgba(16, 185, 129, 0.3);
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Luminous Shine effect */
        .app-frame::before {
            content: "";
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(173, 255, 47, 0.1), transparent);
            transform: rotate(45deg);
            animation: shine 5s infinite;
        }

        @keyframes shine { 0% { transform: translateX(-100%) rotate(45deg); } 100% { transform: translateX(100%) rotate(45deg); } }

        /* Score & Timer Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            color: white;
        }

        .icon-btn {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            width: 38px;
            height: 38px;
            border-radius: 10px;
            color: var(--glow-green);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Question Screen */
        .scenario-card {
            background: rgba(255, 255, 255, 0.95);
            margin-top: 15px;
            padding: 18px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 { font-size: 0.95rem; color: #064e3b; margin: 0; font-weight: 700; }

        /* Highlighted Answer Box */
        #answer-display {
            background: #020617;
            color: #ecfdf5;
            padding: 15px;
            border-radius: 15px;
            margin-top: 15px;
            display: none;
            font-size: 0.8rem;
            border: 1px solid var(--glow-green);
            box-shadow: 0 0 15px rgba(173, 255, 47, 0.2);
        }

        /* Tiny 3D Luminous Buttons */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: auto;
            margin-bottom: 10px;
        }

        .opt-btn {
            background: var(--glow-green);
            border: none;
            padding: 10px 4px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 800;
            color: var(--btn-text);
            cursor: pointer;
            box-shadow: 0 4px 0 #82c91e; /* 3D effect */
            transition: all 0.1s;
            text-transform: uppercase;
        }

        .opt-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #82c91e;
        }

        /* Score Card Modal */
        #score-modal {
            position: absolute;
            inset: 0;
            background: rgba(2, 6, 23, 0.98);
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 30px;
        }

        .stat-line {
            width: 100%;
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            border-bottom: 1px solid rgba(173, 255, 47, 0.2);
            padding-bottom: 4px;
        }

        .val { color: var(--glow-green); font-weight: 800; }
    </style>
</head>
<body>

<div class="app-frame">
    <div class="top-bar">
        <div id="timer" style="font-weight: 800;">⏱ 15s</div>
        <button class="icon-btn" onclick="toggleScore()">
            <i data-lucide="layout-grid"></i>
        </button>
    </div>

    <div class="scenario-card">
        <h2 id="scenario-text">Identifying cognitive distortion...</h2>
    </div>

    <div id="answer-display">
        <div id="res-title" style="color:var(--glow-green); font-weight:800; margin-bottom:4px;"></div>
        <div id="res-body"></div>
        <button onclick="next()" style="margin-top:10px; width:100%; background:var(--glow-green); border:none; border-radius:5px; padding:6px; font-weight:800; cursor:pointer;">CONTINUE</button>
    </div>

    <div id="options" class="options-grid"></div>

    <div id="score-modal">
        <i data-lucide="zap" size="40" style="color:var(--glow-green); margin-bottom:10px;"></i>
        <h3 style="margin-bottom:20px;">MISSION STATS</h3>
        <div class="stat-line"><span>Start Time:</span> <span id="s-start" class="val">-</span></div>
        <div class="stat-line"><span>Situations:</span> <span id="s-total" class="val">0</span></div>
        <div class="stat-line"><span>Correct:</span> <span id="s-correct" class="val">0</span></div>
        <div class="stat-line"><span>Efficiency:</span> <span id="s-percent" class="val">0%</span></div>
        <button onclick="toggleScore()" style="margin-top:30px; background:transparent; border: 1px solid var(--glow-green); color:var(--glow-green); padding:8px 20px; border-radius:20px; cursor:pointer;">CLOSE</button>
    </div>
</div>

<script>
    // Example data - extend with your 100 items
    const scenarios = [
        { id:1, text:"My boss didn't say hi, he must be planning to fire me.", distortion:"Fortune Telling", thought:"He's likely just busy." },
        { id:2, text:"I burned the toast. I can't do anything right.", distortion:"Overgeneralization", thought:"It's just one mistake." }
    ];

    const distortions = ["Mind Reading", "Catastrophizing", "Overgeneralization", "Fortune Telling", "Personalization", "Labeling", "Black & White", "Emotional Reasoning"];

    let state = {
        idx: 0, score: 0, total: 0,
        start: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
        timeLeft: 15, timer: null
    };

    function next() {
        clearInterval(state.timer);
        state.timeLeft = 15;
        document.getElementById('answer-display').style.display = 'none';
        const cur = scenarios[state.idx % scenarios.length];
        document.getElementById('scenario-text').innerText = cur.text;
        
        const optCont = document.getElementById('options');
        optCont.innerHTML = '';
        distortions.forEach(d => {
            const b = document.createElement('button');
            b.className = 'opt-btn';
            b.innerText = d;
            b.onclick = () => check(d, cur);
            optCont.appendChild(b);
        });
        startTimer();
        state.idx++;
    }

    function check(choice, cur) {
        clearInterval(state.timer);
        state.total++;
        const disp = document.getElementById('answer-display');
        const title = document.getElementById('res-title');
        const body = document.getElementById('res-body');

        if(choice === cur.distortion) {
            state.score++;
            title.innerText = "Target Neutralized!";
            body.innerText = `Correct. Counter-thought: ${cur.thought}`;
        } else {
            title.innerText = "Signal Interference";
            body.innerText = `Actually ${cur.distortion}. Counter: ${cur.thought}`;
        }
        disp.style.display = 'block';
        updateStats();
    }

    function startTimer() {
        state.timer = setInterval(() => {
            state.timeLeft--;
            document.getElementById('timer').innerText = `⏱ ${state.timeLeft}s`;
            if(state.timeLeft <= 0) { clearInterval(state.timer); next(); }
        }, 1000);
    }

    function updateStats() {
        document.getElementById('s-total').innerText = state.total;
        document.getElementById('s-correct').innerText = state.score;
        document.getElementById('s-percent').innerText = Math.round((state.score/state.total)*100) + "%";
    }

    function toggleScore() {
        const m = document.getElementById('score-modal');
        m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
    }

    window.onload = () => {
        lucide.createIcons();
        document.getElementById('s-start').innerText = state.start;
        next();
    };
</script>
</body>
</html>
