<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logic Lens | Mental Health App</title>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;900&display=swap" rel="stylesheet">

<style>
/* 1. RESET & CSS FOR MODERN APPS */
body, h1, h2, h3, h4, p, dl, dd { margin: 0; padding: 0; }
body { 
    font-family: 'Plus Jakarta Sans', sans-serif; 
    line-height: 1.5; color: white; overflow: hidden; height: 100vh;
    background-color: #022c22; /* Zen static background */
}

:root {
    --bg-deep: #064e3b;
    --glass: rgba(255, 255, 255, 0.1);
    --neon-green: #adff2f;
    --soft-green: #ecfdf5;
    --text-dark: #064e3b;
    --btn-shadow: #82c91e;
}

/* 2. APP SCREEN CONTAINERS */
.app-screen { 
    width: 100%; height: 100%; position: absolute; inset: 0; 
    transition: opacity 0.5s ease, transform 0.5s ease; padding: 30px; 
    box-sizing: border-box; display: none; /* Controlled by active class */
    transform: scale(0.9); opacity: 0;
}
.app-screen.active { display: flex; flex-direction: column; opacity: 1; transform: scale(1); }

/* == SCREEN 1: LANDING PAGE == */
#landing-screen {
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle, #0a5f44 0%, #064e3b 100%);
    text-align: center;
}

/* The Modern Magnifying Glass Symbol (Start Button) */
.start-btn {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 3px solid var(--neon-green);
    background: transparent;
    color: var(--neon-green);
    font-size: 2.5rem;
    cursor: pointer;
    margin-top: 40px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 0 15px rgba(173, 255, 47, 0.2);
}
.start-btn:active { transform: scale(0.95); }
.start-btn:hover { background: var(--neon-green); color: var(--text-dark); }

/* == SCREEN 2: GAME PANEL (CBT LAB) == */
#game-screen { background-color: var(--bg-deep); z-index: 10; }

#timer-pill { background: rgba(0,0,0,0.3); padding: 5px 12px; border-radius: 20px; color: var(--neon-green); font-weight: 900; font-size: 0.9rem; border: 1px solid var(--neon-green); }

/* Situation Card */
.case-card { background: white; border-radius: 28px; padding: 24px; color: var(--text-dark); box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin-top: 20px; text-align: center; position: relative; z-index: 10; }
h2 { font-size: 0.9rem; line-height: 1.5; margin: 0; font-weight: 600; }

/* Feedback Display (Notebook style) */
#feedback-display {
    background: #022c22;
    border-radius: 20px;
    padding: 15px;
    margin-top: 15px;
    display: none;
    border-left: 4px solid var(--neon-green);
    font-size: 0.8rem;
    border-top: 1px solid rgba(255,255,255,0.1);
}

/* Circular 3D Buttons */
.options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: auto; padding-bottom: 20px; z-index: 10; }
.opt-btn {
    background: var(--soft-green);
    border: none;
    height: 65px; /* Taller, circular feel */
    border-radius: 35px; /* Pill shape */
    font-size: 11px;
    font-weight: 800;
    color: var(--text-dark);
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 4px 0 var(--btn-shadow);
    transition: all 0.1s;
    text-align: center;
    padding: 5px;
}
.opt-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--btn-shadow); }
.opt-btn:disabled { opacity: 0.6; cursor: not-allowed; }

</style>
</head>

<body>

<div style="position:fixed; inset:0; padding:10px; pointer-events:none; z-index:1000; border-radius:45px; box-shadow: 0 0 50px rgba(16, 185, 129, 0.15); border: 1px solid rgba(255,255,255,0.05);"></div>

<div style="position:relative; width:100%; height:100vh; border-radius:40px; overflow:hidden;">

    <div id="landing-screen" class="app-screen active">
        <h1 style="font-weight: 900; font-size: 1.7rem; color: #ecfdf5;">LOGIC LENS</h1>
        <p style="font-size: 0.85rem; color: #82c91e; margin-top: 5px;">Identify Thinking Traps. Reframe Perspectives.</p>
        
        <button class="start-btn" onclick="launchGame()" aria-label="Start Game">
            ⚲ </button>
    </div>

    <div id="game-screen" class="app-screen">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div id="timer-pill">30s</div>
            <div style="color:white; cursor:pointer;" onclick="alert('Stats placeholder')"><i data-lucide="layout-grid"></i></div>
        </div>

        <div class="case-card">
            <div style="font-size: 0.7rem; color: #64748b; font-weight: 800; letter-spacing: 1px; margin-bottom: 8px;">SITUATION</div>
            <h2 id="scenario-text">Detecting thought pattern...</h2>
        </div>

        <div id="feedback-display">
            <div id="fb-title" style="color: var(--neon-green); font-weight: 800; text-transform: uppercase; margin-bottom: 5px;"></div>
            <div id="fb-thought" style="margin-bottom: 12px; color: #f8fafc;"></div>
            <button onclick="nextCase()" style="width:100%; border-radius:12px; border:none; background:var(--neon-green); color:var(--text-dark); padding:10px; font-weight:800; cursor:pointer;">NEXT CASE</button>
        </div>

        <div id="options-grid" class="options-grid"></div>
    </div>

</div>

<script>
    // FULL LIST OF 100 SCENARIOS
    const scenarios = [
        { id:1, text:"They didn't call me back, they must hate me.", distortion:"Mind Reading", thought:"They might be busy." },
        { id:2, text:"I made one mistake. I'm a complete failure.", distortion:"Labeling", thought:"One mistake doesn't define me." },
        { id:3, text:"My presentation was perfect until I stumbled once.", distortion:"Mental Filtering", thought:"The presentation was mostly successful." },
        // ... PASTE THE REST OF YOUR 100 SCENARIOS HERE ...
    ];

    const types = ["Mind Reading", "Catastrophizing", "Overgeneralization", "Emotional Reasoning", "Personalization", "Labeling", "Fortune Telling", "Black & White Thinking"];

    let stats = {faced: 0, score: 0, timer: null, timeLeft: 30 };

    function launchGame() {
        // SWAP ACTIVE SCREENS
        document.getElementById('landing-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');
        
        lucide.createIcons(); // Initialize Icons
        nextCase(); // Launch first scenario randomly
    }

    // THE FULL FUNCTION DEFINITION THAT WAS MISSING
    function nextCase() {
        clearInterval(stats.timer);
        stats.timeLeft = 30; // Reset timer to 30s
        document.getElementById('timer-pill').innerText = stats.timeLeft + "s";
        document.getElementById('feedback-display').style.display = 'none';
        
        // PICK RANDOM SITUATION from the 100 scenarios list
        const randomIdx = Math.floor(Math.random() * scenarios.length);
        const currentCase = scenarios[randomIdx];
        
        document.getElementById('scenario-text').innerText = currentCase.text;
        
        const grid = document.getElementById('options-grid');
        grid.innerHTML = ''; // Clear previous buttons
        
        // Re-build the options grid
        types.forEach(t => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = t;
            btn.onclick = () => check(t, currentCase);
            grid.appendChild(btn);
        });
        
        startTimer();
        stats.faced++;
    }

    function check(choice, currentCase) {
        clearInterval(stats.timer);
        
        const feedback = document.getElementById('feedback-display');
        const title = document.getElementById('fb-title');
        const thought = document.getElementById('fb-thought');

        if(choice === currentCase.distortion) {
            stats.score++;
            title.innerText = "Accurate Identification";
            title.style.color = "var(--neon-green)";
            thought.innerText = "Healthy Thinking: " + currentCase.thought;
        } else {
            title.innerText = "Mistaken Trap";
            title.style.color = "#ef4444"; // Red for wrong
            thought.innerText = "This was " + currentCase.distortion + ". Healthy view: " + currentCase.thought;
        }

        // Show feedback screen, hide options
        feedback.style.display = 'block';
    }

    function startTimer() {
        stats.timer = setInterval(() => {
            stats.timeLeft--;
            document.getElementById('timer-pill').innerText = stats.timeLeft + "s";
            if(stats.timeLeft <= 0) { clearInterval(stats.timer); nextCase(); }
        }, 1000);
    }
</script>
</body>
</html>
