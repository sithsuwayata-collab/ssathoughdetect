<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logic Lens | Mobile 3D CBT</title>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;900&display=swap" rel="stylesheet">

<style>
/* 1. RESET & CSS FOR MOBILE APPS */
body, h1, h2, h3, h4, p, dl, dd { margin: 0; padding: 0; }
body { 
    font-family: 'Plus Jakarta Sans', sans-serif; 
    line-height: 1.5; color: white;
    background-color: #020617; /* Deep Navy background to pop the frame */
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

:root {
    --bg-frame: #022c22;
    --neon-green: #adff2f;
    --soft-green: #ecfdf5;
    --text-dark: #064e3b;
    --shadow-3d: #064e3b;
}

/* 2. THE FIXED 3D MOBILE APP FRAME */
#mobile-frame {
    width: 360px;
    height: 720px;
    background: radial-gradient(circle, #0a5f44 0%, #064e3b 100%);
    border: 3px solid rgba(255,255,255,0.1);
    border-radius: 45px; /* Rounded Phone Edges */
    position: relative;
    box-shadow: 0 50px 100px -20px rgba(0,0,0,0.6), 0 25px 40px -10px rgba(0,0,0,0.4);
    overflow: hidden;
    padding: 15px;
    box-sizing: border-box;
}

/* Simulated Front Camera Hole */
#mobile-frame::after {
    content: ""; position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    width: 10px; height: 10px; border-radius: 50%; background: #020617; z-index: 100;
}

/* Internal Screen Container */
#screen-content { width: 100%; height: 100%; position: relative; }

/* 3. APP SCREEN CONTAINERS */
.app-screen { 
    width: 100%; height: 100%; position: absolute; inset: 0; 
    transition: opacity 0.5s ease, transform 0.5s ease; padding: 20px 10px; 
    box-sizing: border-box; display: none; /* Controlled by active class */
    transform: scale(0.9); opacity: 0;
}
.app-screen.active { display: flex; flex-direction: column; opacity: 1; transform: scale(1); }

/* == SCREEN 1: LANDING PAGE == */
#landing-screen {
    justify-content: center;
    align-items: center;
    text-align: center;
}

.start-btn {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 3px solid var(--neon-green);
    background: transparent;
    color: var(--neon-green);
    font-size: 2.5rem;
    cursor: pointer;
    margin-top: 40px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 0 15px rgba(173, 255, 47, 0.2);
}
.start-btn:active { transform: scale(0.95); }
.start-btn:hover { background: var(--neon-green); color: var(--text-dark); }

/* == SCREEN 2: GAME PANEL (CBT LAB) == */
#timer-pill { background: rgba(0,0,0,0.3); padding: 5px 12px; border-radius: 20px; color: var(--neon-green); font-weight: 900; font-size: 0.9rem; border: 1px solid var(--neon-green); text-align: center; width: 60px; }

.case-card { background: white; border-radius: 25px; padding: 20px; color: var(--text-dark); box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin: 20px 0; text-align: center; }
h2 { font-size: 0.9rem; line-height: 1.5; margin: 0; font-weight: 600; }

#feedback-display {
    background: #020617;
    border-radius: 20px;
    padding: 15px;
    margin-bottom: 20px;
    display: none;
    border-left: 4px solid var(--neon-green);
    font-size: 0.8rem;
    position: relative;
    z-index: 20;
}

/* Circular 3D Buttons */
.options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: auto; padding-bottom: 10px; }
.opt-btn {
    background: var(--soft-green);
    border: none;
    height: 60px; /* Taller, circular feel */
    border-radius: 30px; /* Pill shape */
    font-size: 11px;
    font-weight: 800;
    color: var(--text-dark);
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 4px 0 var(--shadow-3d);
    transition: all 0.05s;
    text-align: center;
    padding: 5px;
}
.opt-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--shadow-3d); }
.opt-btn:disabled { opacity: 0.6; cursor: not-allowed; }

</style>
</head>

<body>

<div id="mobile-frame">
    
    <div id="screen-content">

        <div id="landing-screen" class="app-screen active">
            <h1 style="font-weight: 900; font-size: 1.7rem; color: #ecfdf5;">LOGIC LENS</h1>
            <p style="font-size: 0.85rem; color: #82c91e; margin-top: 5px;">IdentifyThinking Traps. Reframe Perspectives.</p>
            
            <button class="start-btn" onclick="launchGame()" aria-label="Start Game">
                ⚲ </button>
        </div>

        <div id="game-screen" class="app-screen">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div id="timer-pill">30s</div>
                <div style="color:white; cursor:pointer;" onclick="alert('Stats placeholder')"><i data-lucide="layout-grid"></i></div>
            </div>

            <div class="case-card">
                <div style="font-size: 0.7rem; color: #64748b; font-weight: 800; letter-spacing: 1px; margin-bottom: 8px;">SITUATION</div>
                <h2 id="scenario-text">Detecting thought pattern...</h2>
            </div>

            <div id="feedback-display">
                <div id="fb-title" style="color: var(--neon-green); font-weight: 800; text-transform: uppercase; margin-bottom: 5px;"></div>
                <div id="fb-thought" style="margin-bottom: 12px; color: #f8fafc;"></div>
                <button onclick="nextCase()" style="width:100%; border-radius:12px; border:none; background:var(--neon-green); color:var(--text-dark); padding:10px; font-weight:800; cursor:pointer;">NEXT CASE</button>
            </div>

            <div id="options-grid" class="options-grid"></div>
        </div>

    </div>

</div>

<script>
    // Essential sample data list - extend with your full 100 list
    const scenarios = [
        { id:1, text:"They didn't call me back, they must hate me.", distortion:"Mind Reading", thought:"They might be busy." },
        { id:2, text:"I made one mistake. I'm a complete failure.", distortion:"Labeling", thought:"One mistake doesn't define me." }
    ];

    const types = ["Mind Reading", "Catastrophizing", "Overgeneralization", "Emotional Reasoning", "Personalization", "Labeling", "Fortune Telling", "Black & White Thinking"];

    let stats = {faced: 0, score: 0, timer: null, timeLeft: 30 };

    function launchGame() {
        // Toggle Active Screens
        document.getElementById('landing-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');
        
        lucide.createIcons();
        nextCase(); // Launch first randomized scenario
    }

    function nextCase() {
        clearInterval(stats.timer);
        stats.timeLeft = 30; // Reset timer
        document.getElementById('timer-pill').innerText = stats.timeLeft + "s";
        document.getElementById('feedback-display').style.display = 'none';
        
        // Pick Random Scenario
        const randomIdx = Math.floor(Math.random() * scenarios.length);
        const currentCase = scenarios[randomIdx];
        
        document.getElementById('scenario-text').innerText = currentCase.text;
        
        const grid = document.getElementById('options-grid');
        grid.innerHTML = ''; // Clear old buttons
        
        // Re-build option buttons
        types.forEach(t => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = t;
            btn.onclick = () => check(t, currentCase);
            grid.appendChild(btn);
        });
        
        startTimer();
        stats.faced++;
    }

    function check(choice, currentCase) {
        clearInterval(stats.timer);
        const feedback = document.getElementById('feedback-display');
        const title = document.getElementById('fb-title');
        const thought = document.getElementById('fb-thought');

        if(choice === currentCase.distortion) {
            stats.score++;
            title.innerText = "ACCURATE IDENTIFICATION";
            thought.innerText = "Healthy Thinking: " + currentCase.thought;
        } else {
            title.innerText = "MISTAKEN TRAP";
            thought.innerText = "This was Actually: " + currentCase.distortion + ". Healthy View: " + currentCase.thought;
        }
        feedback.style.display = 'block';
    }

    function startTimer() {
        stats.timer = setInterval(() => {
            stats.timeLeft--;
            document.getElementById('timer-pill').innerText = stats.timeLeft + "s";
            if(stats.timeLeft <= 0) { clearInterval(stats.timer); nextCase(); }
        }, 1000);
    }
</script>
</body>
</html>
