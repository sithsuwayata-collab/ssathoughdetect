<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thought Detective Pro</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.2);
            --glass-heavy: rgba(255, 255, 255, 0.85);
            --primary: #6366f1;
            --success: #10b981;
            --error: #ef4444;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background: linear-gradient(135deg, #0f172a, #1e1b4b, #312e81);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* The Shining App Frame */
        .app-frame {
            width: 360px;
            height: 640px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 45px;
            position: relative;
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Shine effect */
        .app-frame::before {
            content: "";
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            animation: shine 8s infinite;
            pointer-events: none;
        }

        @keyframes shine { 0% { transform: translateX(-100%) rotate(45deg); } 100% { transform: translateX(100%) rotate(45deg); } }

        /* Top Bar Icons */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .icon-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .icon-btn:hover { background: rgba(255,255,255,0.4); }

        /* Scenario Card */
        .scenario-container {
            background: var(--glass-heavy);
            margin-top: 20px;
            padding: 20px;
            border-radius: 25px;
            text-align: center;
            min-height: 100px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        h2 { font-size: 1rem; color: #1e293b; margin: 0; line-height: 1.4; }

        /* Feedback Highlight Screen */
        #feedback-screen {
            background: #1e293b;
            color: #f8fafc;
            padding: 15px;
            border-radius: 20px;
            margin-top: 15px;
            display: none;
            font-size: 0.85rem;
            border-left: 4px solid var(--primary);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Tiny 3D Buttons */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: auto;
            padding-bottom: 20px;
        }

        .opt-btn {
            background: #f8fafc;
            border: none;
            padding: 10px 5px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 700;
            color: #475569;
            cursor: pointer;
            box-shadow: 0 4px 0 #cbd5e0; /* The 3D Base */
            position: relative;
            transition: all 0.1s;
        }

        .opt-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #cbd5e0;
        }

        .opt-btn.correct { background: #d1fae5; box-shadow: 0 4px 0 #10b981; color: #065f46; }
        .opt-btn.wrong { background: #fee2e2; box-shadow: 0 4px 0 #ef4444; color: #991b1b; }

        /* Score Card Modal */
        #score-modal {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.95);
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 30px;
            text-align: center;
        }

        .score-row {
            width: 100%;
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding-bottom: 5px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .stat-label { color: #94a3b8; font-size: 0.9rem; }
        .stat-val { font-weight: 800; color: var(--primary); }

        .close-modal {
            margin-top: 30px;
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 99px;
            font-weight: 600;
        }

        #timer-text { color: white; font-weight: 800; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="app-frame">
    <div class="top-bar">
        <div id="timer-text">⏱ 15s</div>
        <button class="icon-btn" onclick="toggleScoreCard()">
            <i data-lucide="bar-chart-3"></i>
        </button>
    </div>

    <div class="scenario-container">
        <h2 id="scenario-text">Loading case...</h2>
    </div>

    <div id="feedback-screen">
        <div id="feedback-title" style="font-weight:800; margin-bottom:5px;"></div>
        <div id="feedback-body"></div>
        <button onclick="nextCase()" style="margin-top:10px; width:100%; background:var(--primary); color:white; border:none; border-radius:8px; padding:8px;">Next →</button>
    </div>

    <div id="options-grid" class="options-grid"></div>

    <div id="score-modal">
        <i data-lucide="award" size="48" style="color:var(--primary); margin-bottom:15px;"></i>
        <h2>Detective Progress</h2>
        <div style="width:100%; margin-top:20px;">
            <div class="score-row"><span class="stat-label">Started:</span> <span id="start-time" class="stat-val">-</span></div>
            <div class="score-row"><span class="stat-label">Cases Faced:</span> <span id="cases-faced" class="stat-val">0</span></div>
            <div class="score-row"><span class="stat-label">Correctly Solved:</span> <span id="cases-correct" class="stat-val">0</span></div>
            <div class="score-row"><span class="stat-label">Accuracy:</span> <span id="cases-percent" class="stat-val">0%</span></div>
        </div>
        <button class="close-modal" onclick="toggleScoreCard()">Return to Field</button>
    </div>
</div>

<script>
    // Include the 100 scenarios from your original file here
    const scenarios = [
        { id:1, text:"My friend didn’t reply to my message all day.", distortion:"Mind Reading", thought:"They might be busy or distracted." },
        { id:2, text:"I failed an important exam I studied for.", distortion:"Catastrophizing", thought:"This is one setback. I can improve." },
        // ... add more from your original scenario list
    ];

    const explainMap = { "Mind Reading":"Assuming others' thoughts.", "Catastrophizing":"Expecting the worst.", "Overgeneralization":"One event = universal rule.", "Emotional Reasoning":"Feelings are facts.", "Personalization":"Blaming yourself.", "Labeling":"Negative identity.", "Black & White Thinking":"No middle ground.", "Fortune Telling":"Predicting failure." };

    let state = {
        index: 0,
        score: 0,
        total: 0,
        startTime: new Date().toLocaleTimeString(),
        timer: null,
        timeLeft: 15
    };

    function init() {
        lucide.createIcons();
        document.getElementById('start-time').innerText = state.startTime;
        nextCase();
    }

    function nextCase() {
        clearInterval(state.timer);
        state.timeLeft = 15;
        document.getElementById('feedback-screen').style.display = "none";
        
        const current = scenarios[state.index % scenarios.length];
        document.getElementById('scenario-text').innerText = current.text;
        
        const grid = document.getElementById('options-grid');
        grid.innerHTML = "";
        
        Object.keys(explainMap).forEach(key => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = key;
            btn.onclick = () => check(btn, key, current);
            grid.appendChild(btn);
        });

        startTimer();
        state.index++;
    }

    function check(btn, val, current) {
        clearInterval(state.timer);
        const btns = document.querySelectorAll('.opt-btn');
        btns.forEach(b => b.disabled = true);

        const screen = document.getElementById('feedback-screen');
        const title = document.getElementById('feedback-title');
        const body = document.getElementById('feedback-body');

        if(val === current.distortion) {
            btn.classList.add('correct');
            state.score++;
            title.innerText = "Case Solved!";
            body.innerText = `Healthy thought: ${current.thought}`;
        } else {
            btn.classList.add('wrong');
            title.innerText = "Mistaken Identity";
            body.innerText = `This was actually ${current.distortion}. Correct Thought: ${current.thought}`;
        }
        
        state.total++;
        updateStats();
        screen.style.display = "block";
    }

    function startTimer() {
        state.timer = setInterval(() => {
            state.timeLeft--;
            document.getElementById('timer-text').innerText = `⏱ ${state.timeLeft}s`;
            if(state.timeLeft <= 0) {
                clearInterval(state.timer);
                alert("Time's up, detective!");
                nextCase();
            }
        }, 1000);
    }

    function updateStats() {
        document.getElementById('cases-faced').innerText = state.total;
        document.getElementById('cases-correct').innerText = state.score;
        const acc = Math.round((state.score/state.total)*100) || 0;
        document.getElementById('cases-percent').innerText = acc + "%";
    }

    function toggleScoreCard() {
        const modal = document.getElementById('score-modal');
        modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
    }

    window.onload = init;
</script>
</body>
</html>
