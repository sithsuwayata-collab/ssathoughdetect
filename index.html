<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thought Detective SL | CBT</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Calm Zen Colors */
            --bg-calm: #022c22;
            --glass: rgba(255, 255, 255, 0.1);
            --neon-green: #adff2f;
            --soft-green: #ecfdf5;
            --text-dark: #064e3b;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; 
            background-color: var(--bg-calm);
            background-image: radial-gradient(circle at top right, #065f46, #022c22);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* The Mobile App Frame */
        .app-container {
            width: 360px;
            height: 640px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 40px;
            position: relative;
            box-shadow: 0 40px 100px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            padding: 24px;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* Modern App Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        #timer-pill {
            background: rgba(0,0,0,0.3);
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 0.85rem;
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
        }

        /* Question Card */
        .case-card {
            background: white;
            border-radius: 28px;
            padding: 24px;
            color: var(--text-dark);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        h2 { font-size: 0.9rem; line-height: 1.5; margin: 0; font-weight: 600; text-align: center; }

        /* Highlighted Feedback Screen */
        #feedback-panel {
            background: #022c22;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid var(--neon-green);
            font-size: 0.8rem;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* 3D Circular Pill Buttons */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: auto;
            padding-bottom: 10px;
        }

        .opt-btn {
            background: var(--soft-green);
            border: none;
            height: 65px; /* Taller, circular feel */
            border-radius: 35px; /* Pill shape */
            font-size: 10px;
            font-weight: 800;
            color: var(--text-dark);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            box-shadow: 0 4px 0 #82c91e; /* 3D effect */
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 5px;
        }

        .opt-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #82c91e;
        }

        .opt-btn.correct { background: #d1fae5; box-shadow: 0 4px 0 #10b981; color: #065f46; }
        .opt-btn.wrong { background: #fee2e2; box-shadow: 0 4px 0 #ef4444; color: #991b1b; }

        /* Bottom Log Drawer (Collapsible) */
        #log-drawer {
            position: absolute;
            bottom: -100%; /* Hidden */
            left: 0;
            width: 100%;
            height: 90%;
            background: #064e3b;
            border-radius: 35px 35px 0 0;
            padding: 24px;
            z-index: 100;
            transition: bottom 0.3s ease-out;
            color: white;
            box-sizing: border-box;
        }

        #log-drawer.open { bottom: 0; }
        
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 10px; color: var(--neon-green); font-weight: 800; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div id="timer-pill">30s</div>
        <div onclick="toggleLog()" style="cursor:pointer;"><i data-lucide="layout-grid"></i></div>
    </div>

    <div class="case-card">
        <div style="font-size: 0.7rem; color: #64748b; margin-bottom: 8px; font-weight: 800; letter-spacing: 1px; text-align:center;">SITUATION</div>
        <h2 id="scenario-text">Gathering evidence...</h2>
    </div>

    <div id="feedback-panel">
        <div id="fb-status" style="color: var(--neon-green); font-weight: 800; margin-bottom: 5px; text-transform: uppercase;"></div>
        <div id="fb-content"></div>
        <button onclick="nextCase()" style="margin-top: 12px; width: 100%; border-radius: 12px; border: none; background: var(--neon-green); color: var(--text-dark); padding: 8px; font-weight: 800; cursor: pointer;">CONTINUE</button>
    </div>

    <div id="options-grid" class="options-grid"></div>

    <div id="log-drawer">
        <div class="header">
            <h3>SESSION LOG</h3>
            <div onclick="toggleLog()" style="cursor:pointer; color:var(--neon-green);"><i data-lucide="x"></i></div>
        </div>
        <div class="stat-row">Solved: <span id="log-faced">0</span></div>
        <div class="stat-row">Score: <span id="log-score">0</span></div>
        <div id="logItems" style="height: 60%; overflow-y: auto; margin-top: 20px;"></div>
    </div>
</div>

<script>
    // FULL Scenarios list from your original file
    const scenarios = [
        { id:1, text:"My friend didn’t reply to my message all day.", distortion:"Mind Reading", thought:"They might be busy or distracted." },
        { id:2, text:"I failed an important exam I studied for.", distortion:"Catastrophizing", thought:"This is one setback. I can improve." },
        // ... PASTE THE REST OF YOUR 100 SCENARIOS HERE ...
    ];

    const explainMap = { "Mind Reading":"Assuming others' thoughts without evidence.", "Catastrophizing":"Expecting the worst outcome.", "Overgeneralization":"One event defines everything.", "Emotional Reasoning":"Feelings = facts.", "Personalization":"Taking it personally unnecessarily.", "Labeling":"Negative identity.", "Black & White Thinking":"All or nothing thinking.", "Fortune Telling":"Predicting the future." };

    let state = { faced: 0, score: 0, timer: null, timeLeft: 30, index: 0 };

    function nextCase() {
        clearInterval(state.timer);
        state.timeLeft = 30; // 30s as requested
        document.getElementById('timer-pill').innerText = state.timeLeft + "s";
        document.getElementById('feedback-panel').style.display = 'none';
        
        const currentCase = scenarios[state.index % scenarios.length];
        document.getElementById('scenario-text').innerText = currentCase.text;
        
        const grid = document.getElementById('options-grid');
        grid.innerHTML = '';
        
        Object.keys(explainMap).forEach(key => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = key;
            btn.onclick = () => check(btn, key, currentCase);
            grid.appendChild(btn);
        });
        
        lucide.createIcons(); // Initialize Icons
        startTimer();
        state.index++;
    }

    function check(btn, choice, currentCase) {
        clearInterval(state.timer);
        state.faced++;
        
        const panel = document.getElementById('feedback-panel');
        const status = document.getElementById('fb-status');
        const content = document.getElementById('fb-content');

        if(choice === currentCase.distortion) {
            btn.classList.add('correct');
            state.score++;
            status.innerText = "Target Confirmed";
            content.innerText = "Healthy view: " + currentCase.thought;
            log(true, currentCase.id);
        } else {
            btn.classList.add('wrong');
            status.innerText = "Mistaken Identity";
            content.innerText = "Actually " + currentCase.distortion + ": " + currentCase.thought;
            log(false, currentCase.id);
        }

        panel.style.display = 'block';
        updateStats();
    }

    function startTimer() {
        state.timer = setInterval(() => {
            state.timeLeft--;
            document.getElementById('timer-pill').innerText = state.timeLeft + "s";
            if(state.timeLeft <= 0) { clearInterval(state.timer); nextCase(); }
        }, 1000);
    }

    function updateStats() {
        document.getElementById('log-faced').innerText = state.faced;
        document.getElementById('log-score').innerText = state.score;
    }

    function toggleLog() {
        const drawer = document.getElementById('log-drawer');
        drawer.classList.toggle('open');
    }

    function log(ok, id){
        let d=document.createElement("div");
        d.style.color= ok ? "#4caf50":"#ff6b6b";
        d.innerText="Case "+id+" - "+(ok?"Correct":"Wrong");
        document.getElementById("logItems").prepend(d);
    }

    window.onload = nextCase;
</script>
</body>
</html>
